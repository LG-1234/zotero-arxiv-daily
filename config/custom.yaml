zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Narrow this later when you know the exact Zotero collection paths.

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: ${oc.env:SMTP_SERVER,smtp.qq.com}
  smtp_port: ${oc.env:SMTP_PORT,465}
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE,https://openrouter.ai/api/v1}
  generation_kwargs:
    model: anthropic/claude-sonnet-4.6
  language: Chinese

source:
  arxiv:
    category: ["econ.EM","econ.GN","q-fin.EC","stat.AP"]
    include_cross_list: false
  medrxiv:
    category:
      - "health economics"
      - "health policy"
      - "health systems and quality improvement"
      - "geriatric medicine"
      - "epidemiology"
      - "public and global health"
      - "primary care research"

executor:
  debug: false
  send_empty: false
  max_workers: 4
  max_paper_num: 10
  source: ["arxiv","medrxiv"]
  reranker: local
